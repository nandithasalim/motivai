services:
  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: motivai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      -  ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
  
  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/motivai
    env_file:
      - .env
      
