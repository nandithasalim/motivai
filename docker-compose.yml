services:
  db:
    image: pgvector/pgvector:pg16
    profiles: ["app", "all"]
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: motivai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
  
  api:
    build: .
    profiles: ["app", "all"]
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/motivai
    env_file:
      - .env
    volumes:
      - upload_tmp:/tmp
  
  redis:
    image: redis:7-alpine
    profiles: ["app", "all"]
    ports:
      - "6379:6379"
      
  worker:
    build: .
    profiles: ["app", "all"]
    command: celery -A reels_celery worker --loglevel=info
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/motivai
      REDIS_URL: redis://redis:6379
    volumes:
      - upload_tmp:/tmp

  minio:
    image: minio/minio
    profiles: ["app", "all"]
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  flower:
    image: mher/flower
    profiles: ["monitoring", "all"]
    command: celery --broker=redis://redis:6379 flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - redis
  
  agent:
    build: .
    profiles: ["app", "all"]
    command: python -u agent_worker.py
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/motivai
      REDIS_URL: redis://redis:6379

volumes:
  upload_tmp:
  minio_data:
  postgres_data: