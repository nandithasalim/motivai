name: MotivAI Tests

on:  # when to trigger 
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs: # wat to do 
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # download github repo code into ubuntu server
      - name: Set up Python # setup python environment on ubuntu server
        uses: actions/setup-python@v5  
        with:
          python-version: '3.11'
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check app/

  test:  # name of the job 
    runs-on: ubuntu-latest #githib provide ubuntu servers
    
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install pytest numpy openai python-dotenv
      
      - name: Run unit tests
        run: pytest tests/test_agent.py -v
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}   